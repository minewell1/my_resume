<!DOCTYPE html>
<html>
<head>
    <title>HTML Forms</title>
</head>
<body>


<h1 style="color:orange; font-family:Georgia;">How can we help?</h1>

<fieldset>
        <legend><h1 style="color:blue"> Request for Proposal</h1></legend>


<table cellpadding="8">

<tr>
    <td>Your name:</td>
    <td><input type="text" name="name"></td>
</tr>

<tr>
    <td>Email:</td>
    <td><input type="email" name="email"></td>
</tr>

<tr>
    <td>Username:</td>
    <td><input type="text" name="username"></td>
</tr>

<tr>
    <td>Password:</td>
    <td><input type="password" name="password"></td>
</tr>

<tr>
    <td valign="top">Your Business:</td>
    <td>
        <textarea rows="6" cols="30">
        </textarea>
    </td>
</tr>

<tr>
    <td valign="top">Company size:</td>
    <td>
        <input type="radio" name="size"> Less than 10 <br>
        <input type="radio" name="size"> 11 to 50 <br>
        <input type="radio" name="size"> 50 to 200 <br>
        <input type="radio" name="size"> Over 200
    </td>
</tr>

<tr>
    <td>Service:</td>
    <td>
        <input type="checkbox" name="service"> Brand Identity
        <input type="checkbox" name="service"> New Website
        <input type="checkbox" name="service"> Web Redesign
    </td>
</tr>

<tr>
    <td>Timeline:</td>
    <td>
        <select name="timeline">
            <option>Immediately</option>
            <option>1-2 weeks</option>
            <option>3-6 weeks</option>
            <option>7-2 months</option>
        </select>
    </td>
</tr>

<tr>
    <td></td>
    <td>
        <input type="submit" value="Send to devdesign">
    </td>
</tr>

</table>
</fieldset>
</form>


</body>
</html>
